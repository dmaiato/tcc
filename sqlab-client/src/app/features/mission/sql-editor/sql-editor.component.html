<div class="h-[180px] rounded-lg border border-border overflow-hidden">
  <div class="h-full flex flex-col bg-card">
    <!-- Title bar with traffic lights -->
    <div class="flex items-center justify-between px-4 py-2.5 border-b border-border bg-muted/30 shrink-0">
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-destructive/60"></div>
        <div class="w-2 h-2 rounded-full bg-accent/60"></div>
        <div class="w-2 h-2 rounded-full bg-primary/60"></div>
      </div>
      <span class="font-mono text-[11px] text-muted-foreground">Crtl+Enter to run</span>
    </div>

    <!-- Textarea -->
    <textarea
      [value]="value"
      (input)="onInput($event)"
      (keydown)="onKeyDown($event)"
      class="flex-1 w-full bg-transparent font-mono text-sm text-foreground p-4 resize-none outline-none leading-relaxed placeholder:text-muted-foreground/40"
      placeholder="Write your SQL query here..."
      spellcheck="false"
      autocapitalize="off"
      autocorrect="off"
    ></textarea>
  </div>
</div>
