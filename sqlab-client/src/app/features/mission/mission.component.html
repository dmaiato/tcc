@if (isLoading()) {
  <div class="h-full flex flex-col min-h-0 text-foreground">
    <div class="flex items-center justify-center gap-1 px-5 py-1.5 border-b border-border bg-background/50 shrink-0">
      <span class="font-mono text-[10px] text-muted-foreground px-3">Loading...</span>
    </div>
    <div class="flex flex-1 min-h-0">
      <div class="w-[38%] border-r border-border flex flex-col min-h-0 bg-background/50"></div>
      <div class="w-[62%] flex flex-col min-h-0 p-4 gap-3">
        <div class="flex-1 min-h-0 rounded-lg border border-border bg-card flex items-center justify-center">
          <div class="flex items-center gap-2 text-muted-foreground">
            <span class="animate-spin">
              <ng-icon name="lucideLoader" class="w-4 h-4" />
            </span>
            <span class="font-mono text-sm">Initializing mission...</span>
          </div>
        </div>
      </div>
    </div>
  </div>
} @else if (mission(); as mission) {
  <div class="h-full flex flex-col min-h-0 text-foreground">
  <!-- Navigator strip -->
  <div class="flex items-center justify-center gap-1 px-5 py-1.5 border-b border-border bg-background/50 shrink-0">
    <span class="font-mono text-[10px] text-muted-foreground px-3">{{ currentIndex() + 1 }} / {{ totalMissions() }}</span>
  </div>

  <!-- Main split 38/62 -->
  <div class="flex flex-1 min-h-0">
    <div class="w-[38%] border-r border-border flex flex-col min-h-0 bg-background/50">
      <app-mission-tabs [mission]="mission" [missionIndex]="currentIndex()" [schema]="schema()" />
    </div>

    <div class="w-[62%] flex flex-col min-h-0 p-4 gap-3">
      <app-sql-editor [value]="query()" [dbModified]="isDbModified()" (valueChange)="onQueryChange($event)" (submit)="executeQuery()" />

      <app-action-bar [query]="query()" [running]="isRunning()" [restoring]="isRestoring()" [verifying]="isValidating()" [verifyResult]="validationResult()" [dbModified]="isDbModified()" (restore)="resetDatabase()" (run)="executeQuery()" (verify)="submitSolution()" />

      <app-results-pane [result]="queryResultWithError" [runId]="runId()" />
    </div>
  </div>
  </div>
}
