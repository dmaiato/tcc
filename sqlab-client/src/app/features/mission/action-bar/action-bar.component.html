<div class="flex items-center justify-between shrink-0">
  <div class="flex items-center gap-3">
    @if (query.length > 0) {
      <span class="font-mono text-[10px] text-muted-foreground">
        {{ query.length }} chars
      </span>
    }

    @if (dbModified) {
      <span class="inline-flex items-center gap-1 font-mono text-[10px] text-accent px-2 py-0.5 rounded-full bg-accent/10 border border-accent/20">
        <ng-icon name="lucideRefreshCw" class="w-3 h-3" />
        Modified
      </span>
    }
  </div>

  <div class="flex items-center gap-2">
    <!-- Restore -->
    <button
      (click)="onRestore()"
      [disabled]="restoring"
      class="font-mono text-xs font-medium px-3 py-2 rounded-md border border-border bg-muted/30 text-muted-foreground hover:text-accent hover:border-accent/30 hover:bg-accent/5 transition-all flex items-center gap-1.5 disabled:opacity-40 disabled:cursor-not-allowed"
      title="Restore all tables to their original state"
    >
      @if (restoring) {
        <ng-icon name="lucideRotateCw" class="w-3.5 h-3.5 animate-spin" />
        Restoring...
      } @else {
        <ng-icon name="lucideRefreshCw" class="w-3.5 h-3.5" />
        Restore DB
      }
    </button>

    <!-- Run -->
    <button
      (click)="onRun()"
      class="font-mono text-sm font-medium px-5 py-2 rounded-md border border-border bg-muted/50 text-foreground hover:bg-muted hover:border-foreground/30 transition-all flex items-center gap-2"
    >
      <ng-icon name="lucidePlay" class="w-3.5 h-3.5" />
      Run Query
    </button>

    <!-- Verify -->
    <button
      (click)="onVerify()"
      [disabled]="isVerifyDisabled"
      class="font-mono text-sm font-medium px-5 py-2 rounded-md border-2 transition-all flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed"
      [class]="verifyClasses"
    >
      @if (verifying) {
        <ng-icon name="lucideRotateCw" class="w-3.5 h-3.5 animate-spin" />
        Verifying...
      } @else if (verifyResult?.correct) {
        <ng-icon name="lucideCheck" class="w-3.5 h-3.5" />
        Verified ✓
      } @else if (verifyResult && !verifyResult.correct) {
        <ng-icon name="lucideX" class="w-3.5 h-3.5" />
        Incorrect
      } @else {
        <ng-icon name="lucideCheck" class="w-3.5 h-3.5" />
        Verify Result
      }
    </button>
  </div>
</div>
