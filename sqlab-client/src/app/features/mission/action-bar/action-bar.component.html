<div class="flex items-center justify-between shrink-0">
  <div class="flex items-center gap-3">
    @if (query.length > 0) {
      <span class="font-mono text-[10px] text-muted-foreground">
        {{ query.length }} chars
      </span>
    }

    @if (dbModified) {
      <span class="inline-flex items-center gap-1 font-mono text-[10px] text-accent px-2 py-0.5 rounded-full bg-accent/10 border border-accent/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 0 0-9-9 9 9 0 0 0-9 9 9 9 0 0 0 9 9 9 9 0 0 0 9-9"/>
          <path d="M21 3v6h-6"/>
        </svg>
        Modified
      </span>
    }
  </div>

  <div class="flex items-center gap-2">
    <!-- Restore -->
    <button
      (click)="onRestore()"
      [disabled]="restoring"
      class="font-mono text-xs font-medium px-3 py-2 rounded-md border border-border bg-muted/30 text-muted-foreground hover:text-accent hover:border-accent/30 hover:bg-accent/5 transition-all flex items-center gap-1.5 disabled:opacity-40 disabled:cursor-not-allowed"
      title="Restore all tables to their original state"
    >
      @if (restoring) {
        <svg class="w-3.5 h-3.5 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-6.219-8.569"/>
        </svg>
        Restoring...
      } @else {
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
        Restore DB
      }
    </button>

    <!-- Run -->
    <button
      (click)="onRun()"
      class="font-mono text-sm font-medium px-5 py-2 rounded-md border border-border bg-muted/50 text-foreground hover:bg-muted hover:border-foreground/30 transition-all flex items-center gap-2"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      Run Query
    </button>

    <!-- Verify -->
    <button
      (click)="onVerify()"
      [disabled]="isVerifyDisabled"
      class="font-mono text-sm font-medium px-5 py-2 rounded-md border-2 transition-all flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed"
      [class]="verifyClasses"
    >
      @if (verifying) {
        <svg class="w-3.5 h-3.5 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-6.219-8.569"/>
        </svg>
        Verifying...
      } @else if (verifyResult?.correct) {
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        Verified ✓
      } @else if (verifyResult && !verifyResult.correct) {
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        Incorrect
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        Verify Result
      }
    </button>
  </div>
</div>
