<main class="flex-1 flex items-center justify-center px-4 py-12 mt-8 animate-fade-in">
  <div class="w-full max-w-md">
    <div class="rounded-xl border border-border bg-card p-6 card-shine">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-primary-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
          </svg>
        </div>
        <div>
          <h1 class="font-sans text-2xl font-bold tracking-tight text-foreground">Login</h1>
          <p class="font-mono text-xs text-muted-foreground">Welcome back to SQLab</p>
        </div>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="space-y-4">
          <div class="space-y-2">
            <label for="email" class="font-mono text-xs text-muted-foreground">Email</label>
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="Enter your email"
              class="w-full px-3 py-2 rounded-lg bg-input border border-border text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring"
            />
            @if (form.get('email')?.touched && form.get('email')?.errors) {
              <span class="text-xs text-destructive font-mono">Please enter a valid email</span>
            }
          </div>

          <div class="space-y-2">
            <label for="password" class="font-mono text-xs text-muted-foreground">Password</label>
            <input
              id="password"
              type="password"
              formControlName="password"
              placeholder="Enter your password"
              class="w-full px-3 py-2 rounded-lg bg-input border border-border text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring"
            />
            @if (form.get('password')?.touched && form.get('password')?.errors) {
              <span class="text-xs text-destructive font-mono">Password is required (min 6 characters)</span>
            }
          </div>
        </div>

        @if (error()) {
          <div class="mt-4 p-3 rounded-lg bg-destructive/10 text-destructive font-mono text-sm">
            {{ error() }}
          </div>
        }

        <button type="submit" [disabled]="form.invalid || loading()" class="mt-6 w-full flex items-center justify-center gap-1.5 px-3 py-2.5 rounded-lg bg-primary text-primary-foreground hover:bg-primary/90 font-mono text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          @if (loading()) {
            <span>Loading...</span>
          } @else {
            <span>Login</span>
          }
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-muted-foreground font-mono">
        Don't have an account? <a routerLink="/register" class="text-primary hover:underline">Register</a>
      </p>
    </div>
  </div>
</main>
