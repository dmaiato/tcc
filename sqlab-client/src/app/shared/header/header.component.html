<header class="px-5 py-3 flex items-center justify-between border-b border-border bg-background/80 backdrop-blur-sm shrink-0">
  <a routerLink="/" class="text-xl font-bold tracking-tight">
    <span class="text-foreground">SQ</span><span class="text-primary">Lab</span>
  </a>

  <nav class="flex items-center gap-3">
    @if (isLoggedIn) {
      <a routerLink="/dashboard" class="text-sm text-muted-foreground hover:text-foreground transition-colors">Dashboard</a>
      <span class="text-sm font-mono text-primary">{{ userName }}</span>
      <button (click)="logout()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-mono text-destructive hover:bg-destructive/10 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Logout
      </button>
    } @else {
      <a routerLink="/login" class="text-sm text-muted-foreground hover:text-foreground transition-colors">Login</a>
      <a routerLink="/register" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-primary text-primary-foreground hover:bg-primary/90 font-mono text-xs font-medium transition-colors">
        Register
      </a>
    }
  </nav>
</header>
