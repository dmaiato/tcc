<header class="px-5 py-3 flex items-center justify-between border-b border-border bg-background/80 backdrop-blur-sm shrink-0 z-50 relative">
  <a routerLink="/" class="flex items-center gap-2.5 group">
    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-secondary flex items-center justify-center">
      <ng-icon name="lucideDatabase" class="w-4 h-4" color="var(--color-badge-icon)"/>
    </div>
    <h1 class="font-sans text-lg font-bold tracking-tight text-foreground group-hover:text-primary transition-colors">
      SQ<span class="text-primary">Lab</span>
    </h1>
  </a>

  <div class="flex items-center gap-1">
    <a routerLink="/dashboard" routerLinkActive="text-primary"
       class="px-3 py-1.5 rounded-lg text-sm font-mono text-muted-foreground hover:text-foreground hover:bg-muted/30 transition-colors">
      Dashboard
    </a>
    <a routerLink="/scenarios" routerLinkActive="text-primary"
       class="px-3 py-1.5 rounded-lg text-sm font-mono text-muted-foreground hover:text-foreground hover:bg-muted/30 transition-colors">
      Scenarios
    </a>
  </div>

  <nav class="flex items-center gap-2">
    <button (click)="themeService.toggle()" type="button"
      class="w-9 h-9 flex items-center justify-center rounded-full border border-border bg-muted/30 text-accent hover:bg-muted/50 transition-colors outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background shrink-0"
      [attr.aria-label]="isLight() ? 'Switch to dark mode' : 'Switch to light mode'">
      @if (isLight()) {
        <ng-icon name="lucideMoon" class="w-4 h-4" />
      } @else {
        <ng-icon name="lucideSun" class="w-4 h-4" />
      }
    </button>
    @if (isLoggedIn()) {
      <div class="relative">
        <button (click)="toggleDropdown()" type="button" class="flex items-center gap-2.5 px-2 py-1.5 rounded-lg hover:bg-muted/50 transition-colors outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background">
          <div class="relative">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-sm font-bold text-primary-foreground">
              {{ userInitial() }}
            </div>
            <div class="absolute -bottom-0.5 -right-0.5 w-4 h-4 rounded-full bg-accent text-accent-foreground flex items-center justify-center text-[8px] font-bold border-2 border-background">
              {{ userLevel() }}
            </div>
          </div>
          <div class="hidden sm:block text-left">
            <p class="font-sans text-xs font-semibold leading-tight text-foreground">{{ userName() }}</p>
            <p class="font-mono text-[9px] text-muted-foreground">Lvl {{ userLevel() }}</p>
          </div>
          <ng-icon name="lucideChevronDown" class="w-3 h-3 text-muted-foreground" />
        </button>

        @if (isDropdownOpen()) {
          <div class="absolute right-0 top-full mt-2 w-64 bg-card border border-border rounded-lg shadow-lg overflow-hidden z-[100]">
            <div class="p-4">
              <div class="flex items-center gap-3 mb-3">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-lg font-bold text-primary-foreground">
                  {{ userInitial() }}
                </div>
                <div>
                  <p class="font-sans text-sm font-semibold text-foreground">{{ userName() }}</p>
                  <p class="font-mono text-[10px] text-muted-foreground">Level {{ userLevel() }}</p>
                </div>
              </div>
              <div class="flex-1 h-1.5 rounded-full bg-muted overflow-hidden" role="progressbar" [attr.aria-valuenow]="xpProgress()" aria-valuemin="0" aria-valuemax="100">
                <div class="h-full rounded-full bg-gradient-to-r from-primary to-accent" [style.width.%]="xpProgress()"></div>
              </div>
              <div class="flex justify-around items-center gap-2 mt-3">
                <div class="text-center rounded-lg bg-muted/50 py-2 w-6 flex-1">
                  <div class="flex items-center justify-center gap-1 text-primary">
                    <ng-icon name="lucideTrophy" class="w-3 h-3" />
                    <span class="font-mono text-xs font-semibold text-primary">{{ solvedMissions() }}</span>
                  </div>
                  <p class="font-mono text-[10px] text-muted-foreground mt-0.5">Solved</p>
                </div>
                <div class="text-center rounded-lg bg-muted/50 py-2 w-6 flex-1">
                  <div class="flex items-center justify-center gap-1 text-accent">
                    <ng-icon name="lucideZap" class="w-3 h-3" />
                    <span class="font-mono text-xs font-semibold text-accent">{{ totalXp() }}</span>
                  </div>
                  <p class="font-mono text-[10px] text-muted-foreground mt-0.5">XP</p>
                </div>
              </div>
            </div>
            <div class="p-2 space-y-0.5">
              <button (click)="goToProfile()" type="button" class="flex items-center gap-2 w-full px-3 py-2.5 rounded-lg font-mono text-xs text-foreground hover:bg-muted/50 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background">
                <ng-icon name="lucideUser" class="w-3.5 h-3.5 text-primary" />
                View Full Profile
              </button>
              @if (isAdmin()) {
                <button (click)="goToAdmin()" type="button" class="flex items-center gap-2 w-full px-3 py-2.5 rounded-lg font-mono text-xs text-foreground hover:bg-muted/50 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background">
                  <ng-icon name="lucideShield" class="w-3.5 h-3.5 text-accent" />
                  Admin Dashboard
                </button>
              }
              <button (click)="logout()" type="button" class="flex items-center gap-2 w-full px-3 py-2.5 rounded-lg font-mono text-xs text-foreground hover:bg-destructive/10 hover:text-destructive transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-destructive focus-visible:ring-offset-2 focus-visible:ring-offset-background">
                <ng-icon name="lucideLogOut" class="w-3.5 h-3.5 text-destructive" />
                Sign out
              </button>
            </div>
          </div>
        }
      </div>
    } @else {
      <a routerLink="/login" class="px-3 py-1.5 rounded-lg text-sm text-muted-foreground hover:text-foreground hover:bg-muted/30 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background">Login</a>
      <a routerLink="/register" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-primary text-primary-foreground hover:bg-primary/90 font-mono text-xs font-medium transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background">
        <ng-icon name="lucideArrowRight" class="w-3.5 h-3.5" />
        Register
      </a>
    }
  </nav>
</header>
